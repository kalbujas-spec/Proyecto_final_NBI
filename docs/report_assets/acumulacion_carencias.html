<!DOCTYPE html>
<html>
<head>

</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-a6e8a74d44b9f5527ade4eecad0e4f23"}, "mark": {"type": "bar", "color": "#b45309", "cornerRadiusTopLeft": 4, "cornerRadiusTopRight": 4}, "encoding": {"tooltip": [{"field": "n_componentes", "type": "ordinal"}, {"field": "hogares", "format": ",", "title": "Hogares", "type": "quantitative"}, {"field": "participacion", "format": ".2f", "title": "Participacion", "type": "quantitative"}], "x": {"field": "n_componentes", "title": "Numero de componentes activos", "type": "ordinal"}, "y": {"axis": {"labelExpr": "datum.value + '%'"}, "field": "participacion", "title": "Participacion dentro de hogares con NBI (%)", "type": "quantitative"}}, "height": 320, "title": "Acumulacion de carencias por hogar", "width": 700, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-a6e8a74d44b9f5527ade4eecad0e4f23": [{"n_componentes": 1, "hogares": 1337508, "participacion": 69.48}, {"n_componentes": 2, "hogares": 462393, "participacion": 24.02}, {"n_componentes": 3, "hogares": 114137, "participacion": 5.93}, {"n_componentes": 4, "hogares": 10588, "participacion": 0.55}, {"n_componentes": 5, "hogares": 515, "participacion": 0.03}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'

      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));

  </script>
</body>
</html>
